<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Alchemy Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      /* Main Layout Container - Responsive Grid/Flex */
      .layout-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Mobile (below 768px): Vertical Stacking */
      @media (max-width: 767px) {
        .layout-container {
          flex-direction: column;
        }
      }

      /* Desktop and Larger (768px and above): Side-by-Side Layout */
      @media (min-width: 768px) {
        .layout-container {
          flex-direction: row;
        }
      }

      .canvas-section {
        flex: 1;
        padding: 0.75rem;
      }

      @media (min-width: 640px) {
        .canvas-section {
          padding: 1.5rem;
        }
      }

      @media (min-width: 1024px) {
        .canvas-section {
          padding: 2rem;
        }
      }

      .element-vault {
        width: 100%;
        border-top: 1px solid #1e293b;
        background-color: rgba(15, 23, 42, 0.95);
        max-height: 40vh;
      }

      @media (min-width: 768px) {
        .element-vault {
          width: 360px;
          border-left: 1px solid #1e293b;
          border-top: none;
          max-height: none;
        }
      }

      .drop-zone {
        background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      .alchemy-token {
        user-select: none;
        cursor: grab;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        touch-action: none;
        white-space: nowrap;
      }

      .alchemy-token:active {
        cursor: grabbing;
      }

      /* Mobile Token Styling (below 640px) */
      @media (max-width: 640px) {
        .alchemy-token {
          padding: 0.5rem 0.75rem !important;
          font-size: 0.75rem;
        }
        .alchemy-token span:last-child {
          display: none;
        }
        .alchemy-token span:first-child {
          font-size: 1.25rem;
        }
      }
    </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6ZXB4B88QZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6ZXB4B88QZ');
</script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="layout-container">
      <section class="canvas-section">
        <div class="mb-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
          <div>
            <p class="text-xs sm:text-sm uppercase tracking-[0.35em] text-cyan-400">AI Alchemy</p>
            <h1 class="text-2xl sm:text-3xl font-semibold">Mix, collide, and discover</h1>
          </div>
          <div class="rounded-full border border-slate-700 bg-slate-900/80 px-2 sm:px-3 py-2 text-xs sm:text-sm text-slate-300 whitespace-nowrap">
            Drag items
          </div>
        </div>

        <div id="canvas" class="drop-zone relative h-[50vh] sm:h-[60vh] md:h-[75vh] min-h-[300px] sm:min-h-[400px] md:min-h-[500px] overflow-hidden rounded-2xl sm:rounded-3xl border border-slate-800 bg-slate-900/80 p-3 sm:p-4">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(34,211,238,0.16),_transparent_45%)]"></div>
          <div class="relative z-10 h-full w-full flex flex-col">
            <div class="mb-3 flex items-center justify-between text-xs sm:text-sm text-slate-400">
              <span>Canvas</span>
              <span id="statusText" class="text-right text-xs sm:text-sm">Drop a basic element to begin.</span>
            </div>
            <div id="canvasTokens" class="relative flex-1 w-full"></div>
          </div>
        </div>
      </section>

      <aside class="element-vault">
        <div class="flex h-auto md:h-full flex-col max-h-[40vh] md:max-h-none">
          <div class="border-b border-slate-800 p-3 sm:p-4">
            <h2 class="text-lg sm:text-xl font-semibold">Element Vault</h2>
            <p class="mt-1 text-xs sm:text-sm text-slate-400">Combine two items by overlap.</p>
          </div>
          <div id="inventoryList" class="flex-1 space-y-2 overflow-y-auto p-3 sm:p-4"></div>
        </div>
      </aside>
    </div>

    <script>
      const inventory = [
        { name: 'Water', emoji: '💧', created: false },
        { name: 'Fire', emoji: '🔥', created: false },
        { name: 'Earth', emoji: '🌱', created: false },
        { name: 'Air', emoji: '💨', created: false }
      ];

      // Alchemy recipes - all combinations for the game
      const recipes = [
        ['water', 'fire', { element: 'Steam', emoji: '💨' }],
        ['fire', 'water', { element: 'Steam', emoji: '💨' }],
        ['water', 'earth', { element: 'Mud', emoji: '🪨' }],
        ['earth', 'water', { element: 'Mud', emoji: '🪨' }],
        ['water', 'air', { element: 'Rain', emoji: '🌧️' }],
        ['air', 'water', { element: 'Rain', emoji: '🌧️' }],
        ['fire', 'earth', { element: 'Lava', emoji: '🌋' }],
        ['earth', 'fire', { element: 'Lava', emoji: '🌋' }],
        ['fire', 'air', { element: 'Spark', emoji: '⚡' }],
        ['air', 'fire', { element: 'Spark', emoji: '⚡' }],
        ['earth', 'air', { element: 'Dust', emoji: '🌫️' }],
        ['air', 'earth', { element: 'Dust', emoji: '🌫️' }],
        ['water', 'water', { element: 'Ice', emoji: '🧊' }],
        ['earth', 'earth', { element: 'Stone', emoji: '🪨' }],
        ['air', 'air', { element: 'Wind', emoji: '🌪️' }],
        ['fire', 'fire', { element: 'Flame', emoji: '🔥' }]
      ];

      const canvas = document.getElementById('canvas');
      const canvasTokens = document.getElementById('canvasTokens');
      const inventoryList = document.getElementById('inventoryList');
      const statusText = document.getElementById('statusText');
      const tokens = [];
      let tokenIdCounter = 0;

      function renderInventory() {
        inventoryList.innerHTML = '';
        inventory.forEach((item) => {
          const card = document.createElement('button');
          card.className = 'flex w-full items-center justify-between rounded-xl sm:rounded-2xl border border-slate-800 bg-slate-900/70 px-2 sm:px-3 py-2 sm:py-3 text-left transition hover:border-cyan-500 hover:bg-slate-800';
          card.draggable = true;
          card.innerHTML = `
            <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
              <span class="text-xl sm:text-2xl flex-shrink-0">${item.emoji}</span>
              <div class="min-w-0">
                <div class="font-medium text-slate-100 text-xs sm:text-sm truncate">${item.name}</div>
                <div class="text-xs text-slate-500 hidden sm:block">Drag onto canvas</div>
              </div>
            </div>
            <span class="text-xs uppercase tracking-[0.3em] text-slate-500 hidden sm:inline">Item</span>
          `;

          card.addEventListener('dragstart', (event) => {
            event.dataTransfer.setData('application/x-item-name', item.name);
            event.dataTransfer.setData('application/x-source', 'sidebar');
            event.dataTransfer.effectAllowed = 'copy';
          });

          inventoryList.appendChild(card);
        });
      }

      function createToken(itemName, x, y) {
        const item = inventory.find((entry) => entry.name === itemName);
        if (!item) return;

        const token = document.createElement('div');
        token.className = 'alchemy-token absolute z-20 flex items-center gap-1 sm:gap-2 rounded-full border border-slate-700 bg-slate-900/95 px-2 sm:px-3 py-1 sm:py-2 text-xs sm:text-sm font-medium text-slate-100';
        token.dataset.id = `token-${tokenIdCounter++}`;
        token.dataset.name = item.name;
        token.style.left = `${x}px`;
        token.style.top = `${y}px`;
        token.innerHTML = `<span class="text-lg sm:text-xl flex-shrink-0">${item.emoji}</span><span class="hidden sm:inline">${item.name}</span>`;

        token.draggable = true;
        
        let isDragging = false;
        
        token.addEventListener('dragstart', (event) => {
          isDragging = true;
          event.dataTransfer.setData('application/x-source', 'canvas');
          event.dataTransfer.setData('application/x-token-id', token.dataset.id);
          event.dataTransfer.effectAllowed = 'move';
        });

        token.addEventListener('dragend', () => {
          isDragging = false;
        });

        canvasTokens.appendChild(token);
        tokens.push(token);
        checkCollisions();
      }

      function moveToken(tokenId, x, y) {
        const token = tokens.find((entry) => entry.dataset.id === tokenId);
        if (!token) return;
        token.style.left = `${x}px`;
        token.style.top = `${y}px`;
        checkCollisions();
      }

      function getTokenRect(token) {
        return {
          left: token.offsetLeft,
          top: token.offsetTop,
          right: token.offsetLeft + token.offsetWidth,
          bottom: token.offsetTop + token.offsetHeight
        };
      }

      function intersects(a, b) {
        const rectA = getTokenRect(a);
        const rectB = getTokenRect(b);
        return !(rectA.right <= rectB.left || rectA.left >= rectB.right || rectA.bottom <= rectB.top || rectA.top >= rectB.bottom);
      }

      function checkCollisions() {
        for (let i = 0; i < tokens.length; i += 1) {
          for (let j = i + 1; j < tokens.length; j += 1) {
            if (intersects(tokens[i], tokens[j])) {
              combineTokens(tokens[i], tokens[j]);
              return;
            }
          }
        }
      }

      function combineTokens(firstToken, secondToken) {
        const firstName = firstToken.dataset.name;
        const secondName = secondToken.dataset.name;

        statusText.textContent = `${firstName} + ${secondName}...`;
        firstToken.remove();
        secondToken.remove();
        tokens.splice(tokens.indexOf(firstToken), 1);
        tokens.splice(tokens.indexOf(secondToken), 1);

        // Look up the recipe locally
        const a = firstName.toLowerCase();
        const b = secondName.toLowerCase();
        const recipe = recipes.find(([x, y]) => (x === a && y === b));
        
        if (recipe) {
          const result = recipe[2];
          if (result.element && result.element !== 'Nothing') {
            const newItem = { name: result.element, emoji: result.emoji || '🧪', created: true };
            inventory.push(newItem);
            renderInventory();
            statusText.textContent = `✨ ${firstName} + ${secondName} = ${result.element} ${result.emoji}`;
          } else {
            statusText.textContent = `No meaningful result from ${firstName} + ${secondName}.`;
          }
        } else {
          statusText.textContent = `No meaningful result from ${firstName} + ${secondName}.`;
        }
      }

      canvas.addEventListener('dragover', (event) => {
        event.preventDefault();
      });

      canvas.addEventListener('drop', (event) => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const source = event.dataTransfer.getData('application/x-source');

        if (source === 'sidebar') {
          const itemName = event.dataTransfer.getData('application/x-item-name');
          const padding = 24;
          const maxX = Math.max(padding, rect.width - 120);
          const maxY = Math.max(padding, rect.height - 60);
          createToken(itemName, Math.max(padding, Math.min(x, maxX)), Math.max(padding, Math.min(y, maxY)));
        } else if (source === 'canvas') {
          const tokenId = event.dataTransfer.getData('application/x-token-id');
          const padding = 24;
          const maxX = Math.max(padding, rect.width - 120);
          const maxY = Math.max(padding, rect.height - 60);
          moveToken(tokenId, Math.max(padding, Math.min(x, maxX)), Math.max(padding, Math.min(y, maxY)));
        }
      });

      renderInventory();
    </script>
  </body>
</html>
